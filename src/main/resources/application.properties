spring.application.name=library

# --- H2 in-memory databaze ---
# Pevne pojmenovana DB (jinak ma nahodne jmeno) + URL pro h2-console
spring.datasource.url=jdbc:h2:mem:library
spring.datasource.username=sa
spring.datasource.password=

# Webova H2 konzole na /h2-console
spring.h2.console.enabled=true

# --- JPA / Hibernate ---
# Vypisuj SQL do logu (uvidis 'create table', inserty, selecty)
spring.jpa.show-sql=true
# Hezke formatovani toho SQL
spring.jpa.properties.hibernate.format_sql=true
# Necht Hibernate vytvori/zahodi schema z entit pri startu (jen pro vyvoj s in-memory DB)
spring.jpa.hibernate.ddl-auto=create-drop
